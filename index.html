<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="热点追踪 - 聚合多个财经科技资讯源的实时热点新闻">
    <title>热点追踪</title>
    <style>
        /* CSS 变量系统 */
        :root {
            /* 主色调 */
            --color-primary: #fa0d00;
            --color-secondary: #00aa00;
            --color-accent: #1890ff;

            /* 背景色 */
            --color-bg-base: #f5f5f5;
            --color-bg-surface: #ffffff;
            --color-bg-elevated: #ffffff;

            /* 文字色 */
            --color-text-primary: #1a1a1a;
            --color-text-secondary: #666666;
            --color-text-tertiary: #999999;

            /* 边框/分割线 */
            --color-border: #e8e8e8;
            --color-divider: #f0f0f0;

            /* 状态色 */
            --color-success: #52c41a;
            --color-warning: #faad14;
            --color-error: #ff4d4f;

            /* 尺寸 */
            --radius-card: 6px;
            --shadow-card: 0 2px 8px rgba(0, 0, 0, 0.08);
            --shadow-card-hover: 0 4px 12px rgba(0, 0, 0, 0.12);

            /* 字体 */
            --font-family: 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        /* 重置样式 */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--color-bg-base);
            color: var(--color-text-primary);
            line-height: 1.5;
            min-height: 100vh;
        }

        /* 头部 */
        .header {
            background: var(--color-bg-surface);
            border-bottom: 1px solid var(--color-border);
            padding: 16px 24px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1800px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            color: var(--color-primary);
        }

        .header-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--color-text-primary);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .update-info {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--color-text-secondary);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--color-success);
        }

        .status-dot.loading {
            background: var(--color-warning);
            animation: pulse 1s infinite;
        }

        .status-dot.error {
            background: var(--color-error);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* 按钮 */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: 500;
            font-family: inherit;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.15s ease-out;
            min-height: 36px;
        }

        .btn-primary {
            background: var(--color-primary);
            color: #fff;
        }

        .btn-primary:hover {
            background: #d90b00;
        }

        .btn-primary:disabled {
            background: var(--color-text-tertiary);
            cursor: not-allowed;
        }

        .btn:focus-visible {
            outline: 2px solid var(--color-accent);
            outline-offset: 2px;
        }

        .btn-icon {
            width: 36px;
            height: 36px;
            padding: 8px;
            background: transparent;
            color: var(--color-text-secondary);
            border: 1px solid var(--color-border);
        }

        .btn-icon:hover {
            background: var(--color-bg-base);
            color: var(--color-text-primary);
        }

        /* 主内容区 */
        .main {
            max-width: 1800px;
            margin: 0 auto;
            padding: 24px;
        }

        /* 卡片网格 */
        .news-grid {
            display: grid;
            gap: 16px;
            grid-template-columns: 1fr;
        }

        @media (min-width: 768px) {
            .news-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (min-width: 1200px) {
            .news-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (min-width: 1600px) {
            .news-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        /* 新闻卡片 */
        .news-card {
            background: var(--color-bg-surface);
            border-radius: var(--radius-card);
            box-shadow: var(--shadow-card);
            overflow: hidden;
            transition: box-shadow 0.2s ease-out;
        }

        .news-card:hover {
            box-shadow: var(--shadow-card-hover);
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            border-bottom: 1px solid var(--color-divider);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .source-icon {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }

        .source-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--color-text-primary);
        }

        .source-tag {
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 3px;
            font-weight: 500;
        }

        .source-tag--fast {
            background: rgba(250, 13, 0, 0.1);
            color: var(--color-primary);
        }

        .source-tag--hot {
            background: rgba(250, 140, 22, 0.1);
            color: #fa8c16;
        }

        .source-tag--tech {
            background: rgba(24, 144, 255, 0.1);
            color: var(--color-accent);
        }

        .source-tag--finance {
            background: rgba(82, 196, 26, 0.1);
            color: var(--color-success);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-time {
            font-size: 11px;
            color: var(--color-text-tertiary);
        }

        .refresh-btn {
            width: 32px;
            height: 32px;
            min-width: 32px;
            min-height: 32px;
            padding: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            background: transparent;
            border-radius: 4px;
            cursor: pointer;
            color: var(--color-text-secondary);
            transition: background-color 0.15s ease-out, transform 0.3s ease-out;
        }

        .refresh-btn:hover {
            background-color: rgba(0, 0, 0, 0.04);
        }

        .refresh-btn:focus-visible {
            outline: 2px solid var(--color-accent);
            outline-offset: 2px;
        }

        .refresh-btn:active {
            transform: scale(0.95);
        }

        .refresh-btn.loading svg {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 新闻列表 */
        .news-list {
            list-style: none;
            padding: 8px 0;
            margin: 0;
        }

        .news-item {
            display: flex;
            align-items: flex-start;
            padding: 10px 16px;
            gap: 10px;
            transition: background-color 0.15s ease-out;
        }

        .news-item:hover {
            background-color: var(--color-bg-base);
        }

        .rank-num {
            width: 20px;
            height: 20px;
            min-width: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            background: var(--color-bg-base);
            color: var(--color-text-secondary);
            flex-shrink: 0;
        }

        .rank-num--hot {
            background: var(--color-primary);
            color: #fff;
        }

        .rank-num--warm {
            background: #fa8c16;
            color: #fff;
        }

        .news-content {
            flex: 1;
            min-width: 0;
        }

        .news-title {
            font-size: 13px;
            line-height: 1.5;
            color: var(--color-text-primary);
            text-decoration: none;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            cursor: pointer;
        }

        .news-title:hover {
            color: var(--color-accent);
        }

        .news-title:focus-visible {
            outline: 2px solid var(--color-accent);
            outline-offset: 2px;
        }

        .news-time {
            font-size: 11px;
            color: var(--color-text-tertiary);
            flex-shrink: 0;
            margin-top: 2px;
        }

        /* 错误状态 */
        .error-message {
            padding: 20px 16px;
            text-align: center;
            color: var(--color-text-secondary);
            font-size: 13px;
        }

        /* 空状态 */
        .empty-message {
            padding: 20px 16px;
            text-align: center;
            color: var(--color-text-tertiary);
            font-size: 13px;
        }

        /* 骨架屏 */
        .skeleton-container {
            padding: 8px 16px;
        }

        .skeleton-item {
            height: 16px;
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: skeleton-loading 1.5s infinite;
            border-radius: 4px;
            margin-bottom: 12px;
        }

        .skeleton-item:last-child {
            margin-bottom: 0;
        }

        .skeleton-item:nth-child(odd) {
            width: 100%;
        }

        .skeleton-item:nth-child(even) {
            width: 80%;
        }

        @keyframes skeleton-loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* 减少动画偏好 */
        @media (prefers-reduced-motion: reduce) {
            .skeleton-item {
                animation: none;
                background: #f0f0f0;
            }
            .news-card,
            .refresh-btn,
            .btn {
                transition: none;
            }
            .refresh-btn.loading svg,
            .status-dot.loading {
                animation: none;
            }
        }

        /* 响应式 */
        @media (max-width: 767px) {
            .header {
                padding: 12px 16px;
            }

            .header-title {
                font-size: 18px;
            }

            .update-info {
                display: none;
            }

            .main {
                padding: 16px;
            }
        }

        /* 加载遮罩 */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--color-border);
            border-top-color: var(--color-primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <!-- 头部 -->
    <header class="header" role="banner">
        <div class="header-content">
            <div class="header-left">
                <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
                </svg>
                <h1 class="header-title">热点追踪</h1>
            </div>
            <div class="header-right">
                <div class="update-info">
                    <span class="status-dot" id="statusDot"></span>
                    <span id="updateTime">正在加载...</span>
                </div>
                <button class="btn btn-primary" id="refreshAllBtn" aria-label="刷新所有数据">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <polyline points="23 4 23 10 17 10"></polyline>
                        <polyline points="1 20 1 14 7 14"></polyline>
                        <path d="m3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                    </svg>
                    刷新
                </button>
            </div>
        </div>
    </header>

    <!-- 主内容 -->
    <main class="main" role="main">
        <div class="news-grid" id="newsGrid">
            <!-- 卡片将通过 JS 动态生成 -->
        </div>
    </main>

    <!-- 加载遮罩 -->
    <div class="loading-overlay hidden" id="loadingOverlay">
        <div class="loading-spinner"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
